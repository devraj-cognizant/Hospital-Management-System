<div class="auth-page-container">
  <div class="auth-card animate-fade-in">
    
    <div class="auth-top-bar">
      <button class="btn-back-minimal" (click)="goBack()">
        <span>←</span> Back
      </button>
      <div class="auth-tabs">
        <button [class.active]="activeTab === AuthTab.Login" (click)="switchTab(AuthTab.Login)">Login</button>
        <button [class.active]="activeTab === AuthTab.Register" (click)="switchTab(AuthTab.Register)">Register</button>
      </div>
    </div>

    <div *ngIf="activeTab === AuthTab.Login" class="auth-section animate-slide-up">
      <div class="auth-header">
        <h3>Welcome Back</h3>
        <p>Enter your credentials to access your secure portal.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="login()" class="modern-form">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="name@example.com" />
          <span class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            Please enter a valid email.
          </span>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="••••••••" />
          <span class="error-msg" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            Password is required.
          </span>
        </div>

        <button class="btn-submit" type="submit" [disabled]="loginForm.invalid">
          Sign In to Portal
        </button>
      </form>
    </div>

    <div *ngIf="activeTab === AuthTab.Register" class="auth-section animate-slide-up">
      <div class="auth-header">
        <h3>Create Clinical Account</h3>
        <p>Join our medical network to manage your health journey.</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="register()" class="modern-form">
        <div class="form-grid">
          <div class="input-group">
            <label>First Name</label>
            <input type="text" formControlName="firstName" placeholder="John" />
          </div>
          <div class="input-group">
            <label>Last Name</label>
            <input type="text" formControlName="lastName" placeholder="Doe" />
          </div>

          <div class="input-group full-width">
            <label>Email Address</label>
            <input type="email" formControlName="email" placeholder="john.doe@hospital.com" />
          </div>

          <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" formControlName="phone" placeholder="10-digit number" />
          </div>
          <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" formControlName="dob" [max]="today" />
          </div>

          <div class="input-group">
            <label>Gender</label>
            <select formControlName="gender">
              <option value="" disabled>Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="input-group">
            <label>Blood Group</label>
            <select formControlName="bloodGroup">
              <option value="" disabled>Select</option>
              <option *ngFor="let bg of ['A+','A-','B+','B-','AB+','AB-','O+','O-']" [value]="bg">{{ bg }}</option>
            </select>
          </div>

          <div class="input-group full-width">
            <label>Password</label>
            <input type="password" formControlName="password" placeholder="Min. 8 characters" />
          </div>
          <div class="input-group full-width">
            <label>Confirm Password</label>
            <input type="password" formControlName="confirmPassword" placeholder="Repeat password" />
            <span class="error-msg" *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched">
              Passwords do not match.
            </span>
          </div>
        </div>

        <button class="btn-submit" type="submit" [disabled]="registerForm.invalid">
          Create Secure Account
        </button>
      </form>
    </div>

    <p class="auth-footer">
      Secured by <strong>MediCare Cloud</strong>
    </p>
  </div>
</div>
