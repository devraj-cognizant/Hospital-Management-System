<div class="auth-page-container">
  <div class="auth-card animate-fade-in">
    
    <div class="auth-top-bar">
      <button class="btn-back-minimal" (click)="goBack()">
        <span>←</span> Portal Selection
      </button>
      <div class="security-badge">
        <span class="lock-icon">🔒</span> Secure Access
      </div>
    </div>

    <div class="auth-section animate-slide-up">
      <div class="auth-header">
        <div class="icon-circle">👨‍⚕️</div>
        <h3>Doctor Login</h3>
        <p>Please enter your clinical credentials to access the secure dashboard.</p>
      </div>

      <form (ngSubmit)="login()" class="modern-form">
        <div class="input-group">
          <label>Clinical Email</label>
          <input 
            type="email" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="dr.name@medicare.com" 
            required 
          />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••" 
            required 
          />
        </div>

        <button class="btn-submit" type="submit">
          Authorize & Sign In
        </button>
      </form>
    </div>

    <div class="auth-footer-note">
      <p>Authorized personnel only. All access is monitored and logged.</p>
    </div>
  </div>
</div>
